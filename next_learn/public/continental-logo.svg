<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">Continental Grand Hotel logo</title>
  <desc id="desc">Gold emblem with the letter C and Continental Grand Hotel wordmark.</desc>
  <defs>
    <radialGradient id="coin" cx="32%" cy="28%" r="76%">
      <stop offset="0%" stop-color="#fce7c3"/>
      <stop offset="48%" stop-color="#d9a450"/>
      <stop offset="100%" stop-color="#6b3a11"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.48"/>
      <stop offset="66%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0f0a05" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g transform="translate(34 30)" filter="url(#softShadow)">
    <circle cx="60" cy="60" r="56" fill="url(#coin)"/>
    <circle cx="60" cy="60" r="53" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="60" cy="60" r="44" fill="url(#shine)" stroke="#f7d9a5" stroke-opacity="0.48" stroke-width="2"/>
    <path d="M60 16a44 44 0 0 1 38 22 44 44 0 0 0-76 0A44 44 0 0 1 60 16Z" fill="#ffffff" opacity="0.16"/>
    <text x="60" y="75" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="3">C</text>
    <circle cx="23" cy="99" r="5.8" fill="#f7d9a5"/>
    <circle cx="98" cy="22" r="5.8" fill="#ffffff" opacity="0.88"/>
  </g>

  <g transform="translate(164 54)">
    <text x="0" y="38" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" letter-spacing="10" fill="url(#word)">CONTINENTAL</text>
    <text x="2" y="74" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" letter-spacing="13" fill="#6b7280">GRAND HOTEL</text>
  </g>
</svg>
