server:
  port: 8091
  servlet:
    context-path: /ai

spring:
  application:
    name: ai-assistant-service
  datasource:
    url: jdbc:mysql://localhost:3306/ai_assistant_service
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  room-service-url: http://localhost:8081/room
  booking-service-url: http://localhost:8084/booking
