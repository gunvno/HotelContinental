server:
  port: 8081
  servlet:
    context-path: /room

spring:
  application:
    name: room-service

  datasource:
    url: jdbc:mysql://localhost:3306/room_service
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver   # ✅ sửa chỗ này

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect   # ✅ THÊM DÒNG NÀY

  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      group-id: room-service-booking-events
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.hotelcontinental.room_service.event.BookingEvent

app:
  services:
    identity: http://localhost:8080/identity
