server:
  port: 8090
  servlet:
    context-path: /chat

spring:
  application:
    name: chat-service


  datasource:
    url: jdbc:mysql://localhost:3306/chat_service
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  identity-service-url: http://localhost:8080/identity

