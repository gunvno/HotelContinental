server:
  port: 8089
  servlet:
    context-path: /report

spring:
  application:
    name: report-service


  datasource:
    url: jdbc:mysql://localhost:3306/report_service
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  services:
    identity: http://localhost:8080/identity
    booking: http://localhost:8084/booking
    billing: http://localhost:8085/billing
