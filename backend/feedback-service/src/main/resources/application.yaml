server:
  port: 8087
  servlet:
    context-path: /feedback

spring:
  application:
    name: feedback-service


  datasource:
    url: jdbc:mysql://localhost:3306/feedback_service
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  services:
    identity: http://localhost:8080/identity

